name: Canary Deployment CI/CD

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Login to DockerHub
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    - name: Build Docker image
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/streaming-app:v2 .

    - name: Push to DockerHub
      run: docker push ${{ secrets.DOCKER_USERNAME }}/streaming-app:v2

    - name: Deployment status
      run: echo "Image pushed successfully - ready for Kubernetes canary deployment"